ollama:
  base_url: "http://localhost:11434/v1"
  agent_model: "llama3.1:8b"        # fast, for 24-agent chatter
  synthesis_model: "qwen2.5:32b"     # heavyweight, for final report
  api_key: "ollama"                   # required by openai client, any value

aoms:
  base_url: "http://localhost:9100"
  recall_limit: 20
  min_relevance: 0.6

market_data:
  spx_ticker: "^GSPC"
  vix_ticker: "^VIX"
  spx_options_ticker: "SPX"
  data_interval: "1m"
  lookback_days: 5

simulation:
  num_rounds: 5            # rounds of debate per cycle
  cycle_interval_sec: 300  # 5 minutes
  conviction_threshold: 70 # min conviction % to include in consensus

database:
  path: "data/swarmspx.duckdb"
