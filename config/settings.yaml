# Legacy fallback (used if providers/models sections missing)
ollama:
  base_url: "http://localhost:11434/v1"
  agent_model: "llama3.1:8b"
  synthesis_model: "phi4:14b"
  api_key: "ollama"

# --- Hybrid model routing ---
# claude_cli provider uses Max plan OAuth via `claude` CLI subprocess
# No API key needed — same auth as Claude Code
providers:
  ollama:
    base_url: "http://localhost:11434/v1"
    api_key: "ollama"

models:
  fast_local:
    provider: ollama
    model: "llama3.1:8b"
  premium_local:
    provider: ollama
    model: "phi4:14b"

tribe_models:
  technical: fast_local       # 6 agents — Llama 8B, fast
  macro: fast_local           # 6 agents — Llama 8B, fast
  sentiment: fast_local       # 6 agents — Llama 8B, fast
  strategists: premium_local  # 6 agents — Phi-4 14B, deeper reasoning

synthesis_model: premium_local  # trade card synthesis via Phi-4 14B

tradier:
  # Set TRADIER_API_KEY in .env to enable live options data
  # Sandbox: https://sandbox.tradier.com/v1 (free, delayed data)
  # Production: https://api.tradier.com/v1 (requires funded account)
  base_url: "https://sandbox.tradier.com/v1"

aoms:
  base_url: "http://localhost:9100"
  recall_limit: 20
  min_relevance: 0.6

market_data:
  spx_ticker: "^GSPC"
  vix_ticker: "^VIX"
  spx_options_ticker: "SPX"
  data_interval: "1m"
  lookback_days: 5

simulation:
  num_rounds: 3            # rounds of debate per cycle
  cycle_interval_sec: 300  # 5 minutes
  conviction_threshold: 70 # min conviction % to include in consensus

database:
  path: "data/swarmspx.duckdb"
